name: Genetic Panel Scraper

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 6am UTC
  workflow_dispatch:        # Allow manual runs from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit results back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scrapers
        run: python main.py

      - name: Move output to results/
        run: |
          mkdir -p results
          cp output/genetic_panels_*.xlsx results/latest.xlsx
          cp output/genetic_panels_*.xlsx results/

      - name: Commit results to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --cached --quiet || git commit -m "chore: scrape results $(date +'%Y-%m-%d')"
          git push
